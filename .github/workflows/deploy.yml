name: 后端自动部署

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本信息
        id: version
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "deploy_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "deployer=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 开始部署后端..."

            # 拉取最新代码
            echo "📥 拉取代码..."
            cd /root/howtoai-backend && git pull origin master

            # 同步代码
            echo "📦 同步代码..."
            rsync -av --exclude='.git' --exclude='__pycache__' --exclude='.env' \
              /root/howtoai-backend/app/ /opt/howtoai/backend/app/
            cp /root/howtoai-backend/requirements.txt /opt/howtoai/backend/
            cp /root/howtoai-backend/Dockerfile /opt/howtoai/backend/

            # 同步配置文件（nginx 配置和 docker-compose）
            echo "📋 同步配置文件..."
            cp /root/howtoai-backend/deploy/nginx/nginx.conf /opt/howtoai/nginx/
            cp /root/howtoai-backend/deploy/docker-compose.yml /opt/howtoai/

            # 写入版本信息
            echo "📝 写入版本信息..."
            echo "commit: ${{ steps.version.outputs.commit_hash }}" > /opt/howtoai/backend/VERSION
            echo "message: ${{ steps.version.outputs.commit_msg }}" >> /opt/howtoai/backend/VERSION
            echo "deploy_time: ${{ steps.version.outputs.deploy_time }}" >> /opt/howtoai/backend/VERSION
            echo "deployer: ${{ steps.version.outputs.deployer }}" >> /opt/howtoai/backend/VERSION

            # 构建并启动（确保所有服务在正确网络中）
            echo "🔨 构建容器..."
            cd /opt/howtoai

            # 确保网络存在
            docker network create howtoai-network 2>/dev/null || true

            # 启动所有服务（确保网络连接正确）
            docker compose up -d --build backend nginx

            # 等待启动
            sleep 15

            # 健康检查
            echo "🏥 健康检查..."
            curl -s https://admin.coderzzp.top/health | grep -q "healthy" && echo "✅ 部署成功" || exit 1