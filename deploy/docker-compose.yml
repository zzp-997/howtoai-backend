version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: howtoai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: howtoai
      MYSQL_USER: howtoai
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
    networks:
      - howtoai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: howtoai-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env.prod
    environment:
      - DATABASE_URL=mysql+aiomysql://howtoai:${MYSQL_PASSWORD}@mysql:3306/howtoai
    ports:
      - "8000:8000"
    networks:
      - howtoai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: howtoai-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html/frontend:ro
    networks:
      - howtoai-network

volumes:
  mysql_data:
    driver: local

networks:
  howtoai-network:
    driver: bridge